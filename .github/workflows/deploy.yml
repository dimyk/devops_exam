name: 'Task 3: Build & Deploy App'

on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Environment to deploy (dev, release, or all)'
        required: true
        default: 'all'

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      # --- СЕРЕДОВИЩЕ DEV ---
      - name: Checkout App (develop)
        if: ${{ github.event.inputs.environment == 'all' || github.event.inputs.environment == 'dev' }}
        uses: actions/checkout@v4
        with:
          repository: 'YulianSalo/devops-exam-pt2'
          ref: 'develop'
          path: 'app-dev'

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build & Push (Dev)
        if: ${{ github.event.inputs.environment == 'all' || github.event.inputs.environment == 'dev' }}
        run: |
          cd app-dev
          docker build -t ${{ secrets.DOCKER_USERNAME }}/exam-app:develop .
          docker push ${{ secrets.DOCKER_USERNAME }}/exam-app:develop

      # --- СЕРЕДОВИЩЕ RELEASE ---
      - name: Checkout App (1.0.0)
        if: ${{ github.event.inputs.environment == 'all' || github.event.inputs.environment == 'release' }}
        uses: actions/checkout@v4
        with:
          repository: 'YulianSalo/devops-exam-pt2'
          ref: '1.0.0'
          path: 'app-release'

      - name: Build & Push (Release)
        if: ${{ github.event.inputs.environment == 'all' || github.event.inputs.environment == 'release' }}
        run: |
          cd app-release
          docker build -t ${{ secrets.DOCKER_USERNAME }}/exam-app:1.0.0 .
          docker push ${{ secrets.DOCKER_USERNAME }}/exam-app:1.0.0

      # --- РОЗГОРТАННЯ НА СЕРВЕРІ ---
      - name: Checkout our repo (for manifests)
        uses: actions/checkout@v4
        with:
          path: 'our-repo'

      - name: Setup SSH & Deploy to Minikube
        env:
          SSHPASS: ${{ secrets.DROPLET_PASSWORD }}
          D_USER: ${{ secrets.DOCKER_USERNAME }}
          ENV_CHOICE: ${{ github.event.inputs.environment }}
        run: |
          sudo apt-get install -y sshpass
          
          # Копіюємо маніфести на сервер
          sshpass -e scp -o StrictHostKeyChecking=no -r our-repo/task3 root@64.227.124.212:/root/

          # Заходимо на сервер і виконуємо команди
          sshpass -e ssh -o StrictHostKeyChecking=no root@64.227.124.212 << EOF
            # Заміна плейсхолдерів
            sed -i "s/DOCKER_USERNAME_PLACEHOLDER/$D_USER/g" /root/task3/dev-manifest.yaml
            sed -i "s/DOCKER_USERNAME_PLACEHOLDER/$D_USER/g" /root/task3/release-manifest.yaml

            # Вимога: Перевірка без розгортання (dry-run)
            kubectl apply -f /root/task3/dev-manifest.yaml --dry-run=client
            kubectl apply -f /root/task3/release-manifest.yaml --dry-run=client

            # Реальне розгортання DEV
            if [ "$ENV_CHOICE" = "all" ] || [ "$ENV_CHOICE" = "dev" ]; then
              kubectl apply -f /root/task3/dev-manifest.yaml
              kubectl rollout restart deployment/exam-app-dev -n dev || true
            fi

            # Реальне розгортання RELEASE
            if [ "$ENV_CHOICE" = "all" ] || [ "$ENV_CHOICE" = "release" ]; then
              kubectl apply -f /root/task3/release-manifest.yaml
              kubectl rollout restart deployment/exam-app-release -n release || true
            fi

            # Очищення старих тунелів
            pkill -f "kubectl port-forward" || true
            sleep 2

            # Вимога: Виконати port-forward для доступу
            nohup kubectl port-forward -n dev svc/exam-service-dev 8002:8002 --address 0.0.0.0 > /root/pf-dev.log 2>&1 &
            nohup kubectl port-forward -n release svc/exam-service-release 8003:8003 --address 0.0.0.0 > /root/pf-release.log 2>&1 &
          EOF
