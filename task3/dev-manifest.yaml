apiVersion: v1
kind: Namespace
metadata:
  name: dev
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: exam-app-dev
  namespace: dev
spec:
  replicas: 1
  selector:
    matchLabels:
      app: exam-app-dev
  template:
    metadata:
      labels:
        app: exam-app-dev
    spec:
      containers:
      - name: app
        image: DOCKER_USERNAME_PLACEHOLDER/exam-app:develop
        imagePullPolicy: Always
        ports:
        - containerPort: 8000
---
apiVersion: v1
kind: Service
metadata:
  name: exam-service-dev
  namespace: dev
spec:
  selector:
    app: exam-app-dev
  ports:
    - protocol: TCP
      port: 8002
      targetPort: 8000