apiVersion: v1
kind: Namespace
metadata:
  name: release
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: exam-app-release
  namespace: release
spec:
  replicas: 1
  selector:
    matchLabels:
      app: exam-app-release
  template:
    metadata:
      labels:
        app: exam-app-release
    spec:
      containers:
      - name: app
        image: DOCKER_USERNAME_PLACEHOLDER/exam-app:1.0.0
        imagePullPolicy: Always
        ports:
        - containerPort: 8000
---
apiVersion: v1
kind: Service
metadata:
  name: exam-service-release
  namespace: release
spec:
  selector:
    app: exam-app-release
  ports:
    - protocol: TCP
      port: 8003
      targetPort: 8000